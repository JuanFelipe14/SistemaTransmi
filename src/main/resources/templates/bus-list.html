<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

</head>

<body>

<h1>Buses</h1>
<a th:href="@{/bus/add}">Agregar</a>
<table class="bus-list">
    <thead>
    <tr>
        <th>Placa</th>
        <th>Modelo</th>
    </tr>
    </thead>
    <tbody>

    <tr th:each="p : ${bus}" th:if="${p.bus}">
        <td th:text="${p.placa}"></td>
        <td th:text="${p.modelo}"></td>
        <td>
            <a th:href="@{/bus/view/{id}(id=${p.id})}">Ver</a>
        </td>
        <td>
            <a th:href="@{/bus/edit-form/{id}(id=${p.id})}">Editar</a>
        </td>
        <td>
            <a th:href="@{/bus/delete/{id}(id=${p.id})}">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>

</html>
